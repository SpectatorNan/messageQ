
# 管理员密钥
admin_key: adminkey123

# 服务器配置
server:
  port: 8080
  host: ""  # 空表示监听所有地址
  shutdown_timeout: 10s

# Broker配置
broker:
  queue_count: 4
  max_retry: 3
  processing_timeout: 30s
  timeout_check_interval: 5s
  data_dir: "./data"
  retry_backoff_base: 1s          # 重试退避基础延迟
  retry_backoff_multiplier: 2.0   # 重试退避指数（每次重试延迟 = 上次 * multiplier）
  retry_backoff_max: 60s          # 重试退避最大延迟

# 存储配置
storage:
  flush_interval: 100ms
  compact_interval: 5m
  compact_threshold: 10485760  # 10MB
  max_record_size: 67108864    # 64MB
  buffer_size: 65536           # 64KB

# 日志配置
logging:
  level: info           # debug, info, warn, error
  output_path: stdout   # stdout, stderr, or file path
  format: console       # console or json